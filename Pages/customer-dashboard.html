<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="customer-dashboard.html">
        <span class="brand-mark"><i class="bi bi-lightning-charge-fill"></i></span>
        <span>SCULPT GYM</span>
      </a>
      <div class="ms-auto d-flex gap-2">
        <button class="btn btn-icon" id="themeToggle" type="button"  title="Toggle theme"><i class="bi bi-moon-stars"></i></button>
        <button class="btn btn-outline-danger" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
      </div>
    </div>
  </nav>

  <main class="container-fluid px-4 py-4">
    <div class="dashboard-header">
      <div>
        <p class="eyebrow">Customer Dashboard</p>
        <h1 id="customerWelcome">Welcome</h1>
      </div>
    </div>

    <section class="row g-3 mb-4">
      <div class="col-md-4"><div class="stat-card"><span>Current Plan</span><strong id="currentPlan">None</strong></div></div>
      <div class="col-md-4"><div class="stat-card"><span>Expiry Date</span><strong id="expiryDate">-</strong></div></div>
      <div class="col-md-4"><div class="stat-card"><span>Days Remaining</span><strong id="daysRemaining">0</strong></div></div>
    </section>

    <section class="workspace-section">
      <div class="section-toolbar">
        <div>
          <p class="eyebrow">Available Plans</p>
          <h2>Choose your next membership</h2>
        </div>
        <input class="form-control search-input" id="availablePlanSearch" type="search" placeholder="Search plans">
      </div>
      <div class="filter-row" id="availablePlanFilters">
        <button class="btn btn-sm btn-primary" data-filter="All">All</button>
        <button class="btn btn-sm btn-outline-primary" data-filter="Monthly">Monthly</button>
        <button class="btn btn-sm btn-outline-primary" data-filter="Quarterly">Quarterly</button>
        <button class="btn btn-sm btn-outline-primary" data-filter="Half-Yearly">Half-Yearly</button>
        <button class="btn btn-sm btn-outline-primary" data-filter="Yearly">Yearly</button>
      </div>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Plan Name</th><th>Duration</th><th>Price</th><th class="text-end">Action</th></tr></thead>
          <tbody id="availablePlansBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/common.js"></script>
  <script src="js/customer.js"></script>
</body>
</html>
